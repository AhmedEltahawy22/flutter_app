<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="مواصلاتي">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>مواصلاتي</title>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase SDK (Compat Version for FlutterFire) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

  <!-- JS Error Logger to capture crash details on screen -->
  <script>
    window.addEventListener('error', function(e) {
      var el = document.createElement('div');
      el.style = 'color:red; font-family:monospace; padding:20px; font-size:14px; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:999999; overflow:auto;';
      el.innerText = 'JS Error:\n' + e.message + '\nat ' + e.filename + ':' + e.lineno + '\n\nStack:\n' + (e.error ? e.error.stack : 'No stack');
      document.body.appendChild(el);
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.createElement('div');
      el.style = 'color:red; font-family:monospace; padding:20px; font-size:14px; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:999999; overflow:auto;';
      el.innerText = 'JS Unhandled Rejection:\n' + e.reason + '\n\nStack:\n' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack');
      document.body.appendChild(el);
    });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
